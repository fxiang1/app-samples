apiVersion: apps/v1
kind: Deployment
metadata:
  name: dep-4-20
  labels:
    app: dep-4-20
    leak-mc-test: "true"
    app-group: app-4
  annotations:
    leak-test/churn-counter: "0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dep-4-20
  template:
    metadata:
      labels:
        app: dep-4-20
        leak-mc-test: "true"
    spec:
      containers:
        - name: worker
          image: registry.example.com/does-not-exist:v20
          command: ["sleep", "infinity"]
          resources:
            requests:
              memory: "8Mi"
              cpu: "1m"
            limits:
              memory: "32Mi"
              cpu: "10m"
