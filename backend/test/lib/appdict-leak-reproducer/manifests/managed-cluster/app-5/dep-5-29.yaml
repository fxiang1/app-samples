apiVersion: apps/v1
kind: Deployment
metadata:
  name: dep-5-29
  labels:
    app: dep-5-29
    leak-mc-test: "true"
    app-group: app-5
  annotations:
    leak-test/churn-counter: "0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dep-5-29
  template:
    metadata:
      labels:
        app: dep-5-29
        leak-mc-test: "true"
    spec:
      containers:
        - name: worker
          image: registry.access.redhat.com/ubi9/ubi-minimal:latest
          command: ["sleep", "infinity"]
          resources:
            requests:
              memory: "8Mi"
              cpu: "1m"
            limits:
              memory: "32Mi"
              cpu: "10m"
