apiVersion: apps/v1
kind: Deployment
metadata:
  name: dep-2-22
  labels:
    app: dep-2-22
    leak-mc-test: "true"
    app-group: app-2
  annotations:
    leak-test/churn-counter: "0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dep-2-22
  template:
    metadata:
      labels:
        app: dep-2-22
        leak-mc-test: "true"
    spec:
      containers:
        - name: worker
          image: registry.access.redhat.com/ubi9/ubi-minimal:latest
          command: ["/bin/sh", "-c", "yes | head -c 100m > /dev/null; sleep infinity"]
          resources:
            requests:
              memory: "8Mi"
              cpu: "1m"
            limits:
              memory: "16Mi"
              cpu: "10m"
